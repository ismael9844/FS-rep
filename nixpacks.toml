[build]
builder = "nixpacks"

[phases.setup]
# On force l'installation de PHP, Composer, Node.js et npm
nixPkgs = ["php", "composer", "nodejs", "npm"]

[phases.build]
# Étapes de build : PHP + Vite
cmds = [
  "composer install --no-dev --optimize-autoloader",
  "npm install",
  "npm run build"
]

[start]
# On démarre Laravel (Railway remplace $PORT automatiquement)
cmd = "php artisan serve --host 0.0.0.0 --port $PORT"
